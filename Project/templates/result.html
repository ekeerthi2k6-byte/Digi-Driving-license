<!DOCTYPE html>
<html>
<head>
<title>AI Result Analysis</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:#22c55e;
    font-family:monospace;
    text-align:center;
}

#flow{
    margin-top:80px;
    font-size:18px;
    min-height:150px;
}

#icon{
    font-size:80px;
    margin:20px;
    display:none;
    animation:pop 0.5s;
}

@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

#btn,#retry{
    display:none;
    padding:12px 25px;
    border:none;
    margin-top:20px;
    cursor:pointer;
    border-radius:5px;
    font-weight:bold;
}

#btn{ background:#22c55e; color:black; }
#retry{ background:#ef4444; color:white; }

#card{
    display:none;
    margin-top:30px;
}

.license{
    width:300px;
    margin:auto;
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(34,197,94,0.5);
}

.photo{
    width:70px;
    height:70px;
    background:#ddd;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="flow"></div>
<div id="icon"></div>

<button id="btn" onclick="showCard()">Download License</button>
<button id="retry" onclick="goBack()">Try Again</button>

<div id="card">
    <div class="license">
        <h3>DRIVING LICENSE</h3>
        <div class="photo"></div>
        <p><b>Name:</b> Keerthi</p>
        <p><b>Vehicle:</b> {{ session.get('vehicle','Car') }}</p>
        <p><b>License No:</b> AP{{ range(1000,9999)|random }}</p>
        <p style="color:green;"><b>Status:</b> VALID</p>
    </div>
</div>

<script>
const theory = Number("{{ theory | default(0) }}");
const sim = Number("{{ sim | default(0) }}");
const total = Number("{{ total | default(0) }}");
const status = "{{ status }}";

const flow = document.getElementById("flow");
const icon = document.getElementById("icon");
const btn = document.getElementById("btn");
const retry = document.getElementById("retry");

function delay(ms){
    return new Promise(r => setTimeout(r, ms));
}

function type(text, speed=20){
    return new Promise(resolve=>{
        let i = 0;
        let interval = setInterval(()=>{
            flow.innerHTML += text.charAt(i);
            i++;
            if(i >= text.length){
                clearInterval(interval);
                flow.innerHTML += "<br>";
                resolve();
            }
        }, speed);
    });
}

async function start(){

    await type("> Initializing AI Evaluation...");
    await delay(300);

    await type("> Checking Theory Knowledge...");
    await delay(300);

    await type("> Analyzing Driving Behavior...");
    await delay(300);

    await type("----------------------------");
    await type("THEORY: " + theory + "%");
    await type("SIMULATOR: " + sim + "%");
    await type("TOTAL: " + total + "%");
    await type("----------------------------");

    await delay(500);

    showResult();
}

function showResult(){

    icon.style.display = "block";

    if(status === "PASS"){
        icon.innerHTML = "✔";
        icon.style.color = "#22c55e";

        btn.style.display = "inline-block";
        retry.style.display = "none";

        flow.innerHTML += "<br><b style='color:#22c55e'>RESULT: PASSED</b>";

    } else {
        icon.innerHTML = "❌";
        icon.style.color = "#ef4444";

        retry.style.display = "inline-block";
        btn.style.display = "none";

        flow.innerHTML += "<br><b style='color:#ef4444'>RESULT: FAILED</b>";
    }
}

function showCard(){
    document.getElementById("card").style.display = "block";
}

function goBack(){
    window.location = "/simulator";
}

start();
</script>

</body>
</html>
